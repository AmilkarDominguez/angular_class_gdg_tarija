<div class="product-page">

  <div class="page-header">
    <div class="page-title-group">
      <h1 class="page-title">Productos</h1>
      <span class="page-subtitle">Catálogo de productos</span>
    </div>
    <button mat-flat-button color="primary" class="add-button" (click)="openCreateModal()">
      <mat-icon>person_add</mat-icon>
      Nuevo Producto
    </button>
  </div>

  <div class="toolbar-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar producto</mat-label>
      <input matInput (input)="onSearch($event)" placeholder="Nombre, NIT, correo o teléfono..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="result-count">{{ filteredProducts().length }} resultado(s)</span>
  </div>

  @if (loading()) {
    <div class="loading-container">
      <mat-spinner diameter="48" />
    </div>
  } @else {
    <app-product-table
      [data]="filteredProducts()"
      (edit)="onEdit($event)"
      (view)="onView($event)"
      (delete)="onDelete($event)"
    />
  }

</div>
